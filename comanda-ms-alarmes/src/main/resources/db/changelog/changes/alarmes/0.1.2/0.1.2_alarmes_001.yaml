databaseChangeLog:
  - changeSet:
      id: alarmes-change-120-1
      author: limit
      comment: Añadir la columna 'notificacio_finalitzada' a la configuración de alarmas para indicar si debe enviarse una notificación cuando finaliza la alarma
      changes:
        - addColumn:
            tableName: ${db_prefix}alarma_config
            columns:
            - column:
                name: notificacio_finalitzada
                type: BOOLEAN
                defaultValueBoolean: true
