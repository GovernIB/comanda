databaseChangeLog:
- changeSet:
    id: conf-alarma-mail-from-1
    author: limit
    comment: Afegir paràmetres de remitent per als correus d'alarmes
    changes:
      - insert:
          tableName: COM_PARAMETRE
          columns:
            - column:
                name: GRUP
                value: "Alarmes"
            - column:
                name: SUBGRUP
                value: "Correu"
            - column:
                name: TIPUS
                value: "TEXT"
            - column:
                name: CODI
                value: "es.caib.comanda.alarma.mail.from.address"
            - column:
                name: NOM
                value: "Adreça del remitent dels correus d'alarma"
