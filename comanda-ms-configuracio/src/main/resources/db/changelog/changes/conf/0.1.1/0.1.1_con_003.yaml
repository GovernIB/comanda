databaseChangeLog:
  - changeSet:
      id: con-change-1-01
      author: limit
      comment: Afegir columna per a la configuració individual de la URL de logs
      changes:
        - addColumn:
            tableName: ${db_prefix}entorn_app
            columns:
              - column:
                  name: logs_url
                  type: VARCHAR(200 ${varcharUnit})
                  remarks: URL usada para la consulta de logs
