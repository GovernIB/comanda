                  name: CODI
                  value: "es.caib.comanda.subsistem.num.error"
              - column:
                  name: NOM
                  value: "Numero d'errors per subsistema"
              - column:
                  name: DESCRIPCIO
                  value: "Fins que no hagui x peticiones amb error, no es considará que el subsistema está caigut"
              - column:
                  name: VALOR
                  value: "5"
              - column:
                  name: EDITABLE
                  valueNumeric: 1

