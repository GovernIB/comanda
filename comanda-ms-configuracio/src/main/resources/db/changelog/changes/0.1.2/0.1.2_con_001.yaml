            tableName: ${db_prefix}PARAMETRE
            columns:
              - column:
                  name: GRUP
                  value: "Salut"
              - column:
                  name: SUBGRUP
                  value: "Configuració"
              - column:
                  name: TIPUS
                  value: "NUMBER"
